#resilience4j.retry.instances.cacheOperationRetry.max-attempts=2
#resilience4j.retry.instances.cacheOperationRetry.wait-duration=200

# ==================== RESILIENCE4J CIRCUIT BREAKER CONFIGURATION ====================
# Circuit breaker configuration for product operations
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.slow-call-rate-threshold=50
resilience4j.circuitbreaker.configs.default.slow-call-duration-threshold=2000
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30000
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=10
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.record-exceptions=java.lang.Exception

# Circuit breaker instance for product operations
#resilience4j.circuitbreaker.instances.productOperationCircuitBreaker.base-config=default
#resilience4j.circuitbreaker.instances.productOperationCircuitBreaker.failure-rate-threshold=50
#resilience4j.circuitbreaker.instances.productOperationCircuitBreaker.wait-duration-in-open-state=30000

# Circuit breaker instance for cache operations
#resilience4j.circuitbreaker.instances.cacheOperationCircuitBreaker.base-config=default
#resilience4j.circuitbreaker.instances.cacheOperationCircuitBreaker.failure-rate-threshold=60
#resilience4j.circuitbreaker.instances.cacheOperationCircuitBreaker.wait-duration-in-open-state=15000
#resilience4j.circuitbreaker.instances.cacheOperationCircuitBreaker.minimum-number-of-calls=5

# ==================== RESILIENCE4J LOGGING ====================
logging.level.io.github.resilience4j=INFO

