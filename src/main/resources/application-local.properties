# ==================== RESILIENCE4J RETRY CONFIGURATION ====================
# Retry configuration for product operations
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=500
resilience4j.retry.configs.default.retry-exceptions=java.sql.SQLException,java.io.IOException

# Retry instance for product operations
#resilience4j.retry.instances.productOperationRetry.base-config=default
